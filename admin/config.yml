backend:
  name: git-gateway
  branch: main

local_backend: true
publish_mode: simple
media_folder: uploads
public_folder: /uploads

collections:
  - name: portfolio
    label: Portfolio Content / 作品集内容
    files:
      - name: projects
        label: Projects / 项目作品
        file: content/projects.json
        format: json
        fields:
          - name: projects
            label: Projects / 项目作品
            label_singular: Project / 项目作品
            widget: list
            minimize_collapsed: true
            summary: "{{fields.basic.title}} — {{fields.basic.track}}"
            fields:
              - name: basic
                label: Basic Info / 基础信息
                widget: object
                collapsed: false
                fields:
                  - { name: title, label: English Title / 英文标题, widget: string }
                  - { name: zh, label: Chinese Title / 中文标题, widget: string }
                  - name: slug
                    label: URL Slug / 链接名称
                    widget: string
                    hint: "Lowercase English and hyphens only, e.g. ai-study-partner / 仅使用小写英文与连字符"
                    pattern: ["^[a-z0-9]+(?:-[a-z0-9]+)*$", "Use lowercase letters, numbers and hyphens / 请使用小写字母、数字和连字符"]
                  - name: track
                    label: Track / 学习方向
                    widget: select
                    options:
                      - { label: English / 英语, value: english }
                      - { label: AI / 人工智能, value: ai }
                      - { label: Digital Media / 数字媒体, value: media }
                      - { label: Business / 商业, value: business }
                  - name: tags
                    label: Tags / 标签
                    widget: list
                    required: false
                    field: { name: tag, label: Tag / 标签, widget: string }
                  - { name: featured, label: Featured on Home / 首页推荐, widget: boolean, default: false }

              - name: card
                label: Card Display / 卡片展示
                widget: object
                collapsed: false
                fields:
                  - { name: summary, label: Card Summary / 卡片简介, widget: text }
                  - { name: mark, label: Cover Mark / 封面符号, widget: string, default: "↗", hint: "A short mark such as AI, Aa, ¥ or ↗ / 可填写简短符号" }
                  - name: color
                    label: Color / 卡片颜色
                    widget: select
                    default: lime
                    options:
                      - { label: Lime / 青柠绿, value: lime }
                      - { label: Purple / 紫色, value: purple }
                      - { label: Blue / 蓝色, value: blue }
                      - { label: Orange / 橙色, value: orange }

              - name: content
                label: Project Content / 项目内容
                widget: object
                collapsed: false
                fields:
                  - { name: objective, label: Objective / 项目目标, widget: text }
                  - name: tools
                    label: Tools Used / 使用工具
                    widget: list
                    required: false
                    field: { name: tool, label: Tool / 工具, widget: string }
                  - name: process
                    label: Process / 项目过程
                    widget: list
                    field: { name: step, label: Step / 步骤, widget: text }
                  - { name: result, label: Result / 项目结果, widget: text }
                  - { name: learned, label: What I Learned / 我的收获, widget: text }
                  - { name: nextStep, label: Next Step / 下一步, widget: text, required: false }

              - { name: body, label: Body / 正文, widget: markdown, required: false, hint: "Write the full story, notes or evidence here / 在这里记录完整故事、笔记或证据" }

      - name: articles
        label: Journal / 成长日志
        file: content/articles.json
        format: json
        fields:
          - name: articles
            label: Journal / 成长日志
            label_singular: Journal Entry / 成长日志
            widget: list
            minimize_collapsed: true
            summary: "{{fields.date}} — {{fields.title}}"
            fields:
              - { name: title, label: English Title / 英文标题, widget: string }
              - { name: zh, label: Chinese Title / 中文标题, widget: string }
              - { name: date, label: Date / 日期, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
              - name: track
                label: Track / 学习方向
                widget: select
                options:
                  - { label: English / 英语, value: english }
                  - { label: AI / 人工智能, value: ai }
                  - { label: Digital Media / 数字媒体, value: media }
                  - { label: Business / 商业, value: business }
              - name: tags
                label: Tags / 标签
                widget: list
                required: false
                field: { name: tag, label: Tag / 标签, widget: string }
              - { name: summary, label: Summary / 摘要, widget: text }
              - { name: body, label: Body / 正文, widget: markdown }
              - { name: reflection, label: Reflection / 复盘反思, widget: markdown, required: false }
              - { name: nextStep, label: Next Step / 下一步, widget: text, required: false }
